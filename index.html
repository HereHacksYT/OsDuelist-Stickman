<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OsDuelist Stickman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELEFONU YAN ÇEVİRME UYARISI -->
    <div id="rotate-warning">
        <div class="warning-text">
            <h2>Lütfen Telefonu Yan Çevirin! 🔄</h2>
            <p>OsDuelist Stickman sadece yatay ekranda oynanabilir.</p>
        </div>
    </div>

    <!-- ANA GİRİŞ VE ÖZELLEŞTİRME MENÜSÜ -->
    <div id="main-menu">
        <h1>OSDUELIST STICKMAN</h1>
        
        <div class="customization-container">
            <!-- OYUNCU 1 SEÇİM ALANI -->
            <div class="char-select" id="p1-select">
                <h3>OYUNCU 1 (MAVİ)</h3>
                <div class="select-row">
                    <span>Renk:</span>
                    <button onclick="changeColor(1, -1)">◀</button>
                    <span id="p1-color-text" style="color:#3498db">Mavi</span>
                    <button onclick="changeColor(1, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Şapka:</span>
                    <button onclick="changeHat(1, -1)">◀</button>
                    <span id="p1-hat-text">Yok</span>
                    <button onclick="changeHat(1, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Silah:</span>
                    <button onclick="changeWeapon(1, -1)">◀</button>
                    <span id="p1-weapon-text">Kılıç</span>
                    <button onclick="changeWeapon(1, 1)">▶</button>
                </div>
            </div>

            <!-- OYUNCU 2 SEÇİM ALANI -->
            <div class="char-select" id="p2-select">
                <h3>OYUNCU 2 / BOT (KIRMIZI)</h3>
                <div class="select-row">
                    <span>Renk:</span>
                    <button onclick="changeColor(2, -1)">◀</button>
                    <span id="p2-color-text" style="color:#e74c3c">Kırmızı</span>
                    <button onclick="changeColor(2, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Şapka:</span>
                    <button onclick="changeHat(2, -1)">◀</button>
                    <span id="p2-hat-text">Yok</span>
                    <button onclick="changeHat(2, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Silah:</span>
                    <button onclick="changeWeapon(2, -1)">◀</button>
                    <span id="p2-weapon-text">Lazer</span>
                    <button onclick="changeWeapon(2, 1)">▶</button>
                </div>
            </div>
        </div>

        <!-- MOD SEÇİM BUTONLARI -->
        <div class="menu-buttons">
            <button class="menu-btn" onclick="startGame(1)">1 OYUNCU (VS BOT)</button>
            <button class="menu-btn" onclick="startGame(2)">2 OYUNCU (AYNI EKRAN)</button>
        </div>
    </div>

    <!-- OYUN İÇİ CAN VE HUD PANELİ -->
    <div id="ui-container" class="hidden">
        <div class="player-hud" id="p1-hud">
            <div class="username" id="p1-name-display">Oyuncu 1</div>
            <div class="health-bar-container">
                <div class="health-bar" id="p1-health"></div>
            </div>
        </div>
        
        <div class="player-hud" id="p2-hud">
            <div class="username" id="p2-name-display">Bot</div>
            <div class="health-bar-container">
                <div class="health-bar" id="p2-health"></div>
            </div>
        </div>
    </div>

    <!-- TELEFON MOBİL DOKUNMATİK KONTROLLERİ -->
    <div id="mobile-controls" class="hidden">
        <!-- Oyuncu 1 Butonları (Ekranın Solunda) -->
        <div class="joystick-zone" id="p1-ctrl">
            <button class="btn ctrl-btn" id="btn-p1-left">◀</button>
            <button class="btn ctrl-btn" id="btn-p1-up">▲</button>
            <button class="btn ctrl-btn" id="btn-p1-right">▶</button>
            <button class="btn attack-btn" id="btn-p1-atk">⚔</button>
        </div>

        <!-- Oyuncu 2 Butonları (Ekranın Sağında - 2 Kişilik Mod İçin) -->
        <div class="joystick-zone" id="p2-ctrl">
            <button class="btn attack-btn" id="btn-p2-atk">⚔</button>
            <button class="btn ctrl-btn" id="btn-p2-left">◀</button>
            <button class="btn ctrl-btn" id="btn-p2-up">▲</button>
            <button class="btn ctrl-btn" id="btn-p2-right">▶</button>
        </div>
    </div>

    <!-- Oyunun 16:9 Çizileceği Ekran -->
    <canvas id="gameCanvas"></canvas>

    <!-- JS Modül Bağlantıları -->
    <script src="src/physics.js"></script>
    <script src="src/player.js"></script>
    <script src="src/weapon.js"></script>
    <script src="src/game.js"></script>

</body>
</html>
