<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OsDuelist Stickman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELEFONU DÖNDÜR UYARISI -->
    <div id="rotate-warning">
        <div class="warning-text">
            <h2>Lütfen Telefonu Yan Çevirin! 🔄</h2>
            <p>OsDuelist Stickman sadece yatay ekranda oynanabilir.</p>
        </div>
    </div>

    <!-- MOBİL UYUMLU SIKIŞTIRILMIŞ ANA MENÜ (TAMAMI) -->
    <div id="main-menu">
        
        <!-- Üst Kısım: Oyuncu Seçimleri -->
        <div class="selectors-container">
            <!-- OYUNCU 1 -->
            <div class="player-panel">
                <h2 style="color: #3498db; border-bottom: 2px solid #3498db;">Oyuncu 1 (Mavi)</h2>
                <div class="select-row">
                    <span>Renk:</span>
                    <button class="arrow-btn" onclick="changeColor(1, -1)">◀</button>
                    <span id="p1-color-text" class="select-value" style="color: #3498db;">Mavi</span>
                    <button class="arrow-btn" onclick="changeColor(1, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Şapka:</span>
                    <button class="arrow-btn" onclick="changeHat(1, -1)">◀</button>
                    <span id="p1-hat-text" class="select-value">Yok</span>
                    <button class="arrow-btn" onclick="changeHat(1, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Silah:</span>
                    <button class="arrow-btn" onclick="changeWeapon(1, -1)">◀</button>
                    <span id="p1-weapon-text" class="select-value">Kılıç</span>
                    <button class="arrow-btn" onclick="changeWeapon(1, 1)">▶</button>
                </div>
            </div>

            <!-- OYUNCU 2 / BOT -->
            <div class="player-panel">
                <h2 style="color: #e74c3c; border-bottom: 2px solid #e74c3c;">Oyuncu 2 (Kırmızı)</h2>
                <div class="select-row">
                    <span>Renk:</span>
                    <button class="arrow-btn" onclick="changeColor(2, -1)">◀</button>
                    <span id="p2-color-text" class="select-value" style="color: #e74c3c;">Kırmızı</span>
                    <button class="arrow-btn" onclick="changeColor(2, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Şapka:</span>
                    <button class="arrow-btn" onclick="changeHat(2, -1)">◀</button>
                    <span id="p2-hat-text" class="select-value">Yok</span>
                    <button class="arrow-btn" onclick="changeHat(2, 1)">▶</button>
                </div>
                <div class="select-row">
                    <span>Silah:</span>
                    <button class="arrow-btn" onclick="changeWeapon(2, -1)">◀</button>
                    <span id="p2-weapon-text" class="select-value">Lazer</span>
                    <button class="arrow-btn" onclick="changeWeapon(2, 1)">▶</button>
                </div>
            </div>
        </div>

        <!-- Alt Kısım: Harita Seçimi ve Başlat Butonları Bir Arada -->
        <div class="bottom-controls">
            <!-- Harita Seçici -->
            <div class="map-selector">
                <span>HARİTA:</span>
                <button class="arrow-btn" onclick="changeMap(-1)">◀</button>
                <span id="map-name-text">Yüksek Arena</span>
                <button class="arrow-btn" onclick="changeMap(1)">▶</button>
            </div>
            
            <!-- Başlat Butonları -->
            <div class="action-buttons">
                <button class="start-btn bot-btn" onclick="startGame(1)">Bot ile Başlat</button>
                <button class="start-btn" onclick="startGame(2)">2 Oyuncu Başlat</button>
            </div>
        </div>

    </div>

    <!-- OYUN İÇİ CAN BARLARI (HUD) -->
    <div id="ui-container" class="hidden">
        <div class="player-hud" id="p1-hud">
            <div class="username" id="p1-name-display">Oyuncu 1</div>
            <div class="health-bar-container">
                <div class="health-bar" id="p1-health"></div>
            </div>
        </div>
        
        <div class="player-hud" id="p2-hud">
            <div class="username" id="p2-name-display">Bot</div>
            <div class="health-bar-container">
                <div class="health-bar" id="p2-health"></div>
            </div>
        </div>
    </div>

    <!-- MOBİL DOKUNMATİK DÜĞMELER (JOYSTICK ALANLARI) -->
    <div id="mobile-controls" class="hidden">
        <div class="joystick-zone" id="p1-ctrl">
            <button class="btn ctrl-btn" data-btn="KeyA">◀</button>
            <button class="btn ctrl-btn" data-btn="KeyW">▲</button>
            <button class="btn ctrl-btn" data-btn="KeyD">▶</button>
            <button class="btn attack-btn" data-btn="Space">⚔</button>
        </div>

        <div class="joystick-zone" id="p2-ctrl">
            <button class="btn attack-btn" data-btn="KeyL">⚔</button>
            <button class="btn ctrl-btn" data-btn="ArrowLeft">◀</button>
            <button class="btn ctrl-btn" data-btn="ArrowUp">▲</button>
            <button class="btn ctrl-btn" data-btn="ArrowRight">▶</button>
        </div>
    </div>

    <!-- OYUNUN ÇİZİLDİĞİ TUVAL -->
    <canvas id="gameCanvas"></canvas>

    <!-- MOTOR BETİKLERİ -->
    <script src="src/physics.js"></script>
    <script src="src/player.js"></script>
    <script src="src/weapon.js"></script>
    <script src="src/game.js"></script>

</body>
</html>
